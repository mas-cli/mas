#
# .github/workflows/codeql.yaml
#
---
name: CodeQL
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
  - cron: 44 14 * * 4
  workflow_dispatch: {}
permissions: {}
jobs:
  analyze:
    name: Analyze ${{matrix.language}}
    runs-on: macos-26
    permissions:
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
        - language: actions
          build-mode: none
        - language: swift
          build-mode: manual
    steps:
    - name: 🛒 Checkout repo
      env:
        GIT_CONFIG_COUNT: 1
        GIT_CONFIG_KEY_0: init.defaultBranch
        GIT_CONFIG_VALUE_0: ${{github.event.repository.default_branch}}
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        # Include all history & tags for Scripts/version
        fetch-depth: 0

    - name: 🔧 Setup repo
      run: Scripts/setup_workflow_repo

    - name: 🔩 Initialize CodeQL
      uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
      with:
        languages: ${{matrix.language}}
        build-mode: ${{matrix.build-mode}}
        queries: ${{matrix.language == 'swift' && '+security-and-quality' || ''}}

    - name: 🏗 Build Swift
      if: matrix.language == 'swift'
      shell: bash
      run: |
        sudo xcode-select -s /Applications/Xcode_26.4.app
        Scripts/build codeql -c release

    - name: 🔍 Perform CodeQL analysis
      uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
      with:
        category: /language:${{matrix.language}}
